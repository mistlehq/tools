pre-commit:
  parallel: false
  commands:
    lint-staged:
      run: bun run lint-staged

commit-msg:
  parallel: false
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: false
  commands:
    lint:
      run: bun run lint
    typecheck:
      run: bun run typecheck
    test:
      run: bun run test
