name: Release

on:
  push:
    tags:
      - "*/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Parse Release Tag
        id: parse
        run: |
          tag="${GITHUB_REF_NAME}"
          cli="${tag%%/*}"
          version="${tag#*/}"

          if [ "$cli" = "$tag" ] || [ -z "$cli" ] || [ -z "$version" ]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          if [ ! -d "cmd/$cli" ]; then
            echo "Unknown CLI: $cli" >&2
            exit 1
          fi

          echo "cli=$cli" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "asset_name=${cli}-linux-amd64" >> "$GITHUB_OUTPUT"

      - name: Build Release Binary
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build \
            -ldflags "-X main.Version=${{ steps.parse.outputs.version }}" \
            -o "dist/${{ steps.parse.outputs.asset_name }}" \
            "./cmd/${{ steps.parse.outputs.cli }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${{ steps.parse.outputs.asset_name }}#${{ steps.parse.outputs.asset_name }}" \
            --title "${{ steps.parse.outputs.cli }} ${{ steps.parse.outputs.version }}" \
            --generate-notes
